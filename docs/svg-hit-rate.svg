<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 130" fill="none" role="img" aria-label="Shared Cache Hit — cluster nodes share a common cache pool">
  <style>
    svg { color-scheme: light dark; --ink: 255, 255, 255; }
    @media (prefers-color-scheme: light) { svg { --ink: 30, 32, 44; } }

    text { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", sans-serif; }
    .hit-lbl   { fill: rgba(var(--ink), 0.48); font-size: 9px; font-weight: 700; letter-spacing: 0.1em; }
    .hit-badge { fill: rgba(247,148,29,1); font-size: 10px; font-weight: 700; letter-spacing: 0.05em; animation: hitFlicker 2.4s ease-in-out infinite; }
    .hit-pool  { fill: rgba(var(--ink), 0.05); stroke: rgba(var(--ink), 0.40); stroke-width: 1.2; }
    .hit-node  { fill: rgba(var(--ink), 0.08); stroke: rgba(var(--ink), 0.45); stroke-width: 1; animation: hitFlicker 2.4s ease-in-out infinite; }
    .hit-dot   { fill: rgba(var(--ink), 0.50); animation: hitFlicker 2.4s ease-in-out infinite; }
    .hit-conn  { stroke: rgba(247,148,29,0.85); stroke-width: 1.2; stroke-linecap: round; stroke-dasharray: 4 3; animation: hitFlow 0.8s linear infinite; }
    .hit-travel { fill: rgba(247,148,29,1); animation: hitTravel 1.1s linear infinite; }
    .hit-pulse { fill: rgba(247,148,29,1); animation: hitPulse 2s ease-in-out infinite; }

    @keyframes hitFlicker { 0%, 100% { opacity: 0.45; } 50% { opacity: 1; } }
    @keyframes hitFlow    { to { stroke-dashoffset: -7; } }
    @keyframes hitTravel  { 0% { transform: translateY(0); opacity: 0.25; } 15% { opacity: 1; } 85% { opacity: 1; } 100% { transform: translateY(22px); opacity: 0.2; } }
    @keyframes hitPulse   { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
  </style>

  <!-- Shared cache pool -->
  <rect class="hit-pool" x="30" y="72" width="160" height="34" rx="6" />
  <text class="hit-lbl" x="78" y="93">SHARED CACHE</text>

  <!-- Cluster nodes -->
  <rect class="hit-node" x="22"  y="22" width="36" height="28" rx="4" />
  <circle class="hit-dot" cx="40"  cy="36" r="4" />

  <rect class="hit-node" x="92"  y="22" width="36" height="28" rx="4" style="animation-delay:0.3s" />
  <circle class="hit-dot" cx="110" cy="36" r="4" style="animation-delay:0.3s" />

  <rect class="hit-node" x="162" y="22" width="36" height="28" rx="4" style="animation-delay:0.6s" />
  <circle class="hit-dot" cx="180" cy="36" r="4" style="animation-delay:0.6s" />

  <!-- Connection lines -->
  <line class="hit-conn" x1="40"  y1="50" x2="40"  y2="72" style="animation-delay:0.1s" />
  <line class="hit-conn" x1="110" y1="50" x2="110" y2="72" style="animation-delay:0.4s" />
  <line class="hit-conn" x1="180" y1="50" x2="180" y2="72" style="animation-delay:0.7s" />

  <!-- Travel particles -->
  <circle class="hit-travel" cx="40"  cy="50" r="3" />
  <circle class="hit-travel" cx="110" cy="50" r="3" style="animation-delay:0.3s" />
  <circle class="hit-travel" cx="180" cy="50" r="3" style="animation-delay:0.6s" />

  <!-- Hit pulse -->
  <circle class="hit-pulse" cx="110" cy="89" r="4" />

  <!-- HIT badge -->
  <text class="hit-badge" x="110" y="122" text-anchor="middle">HIT ✓</text>
</svg>
