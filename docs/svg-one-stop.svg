<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 176" fill="none" role="img" aria-label="One-Stop AI Platform stack">
  <style>
    /* Transparent background — adapts to GitHub light/dark theme.
       --ink is the neutral line/text color: white on dark, dark ink on light. */
    svg { color-scheme: light dark; --ink: 255, 255, 255; }
    @media (prefers-color-scheme: light) { svg { --ink: 30, 32, 44; } }

    text { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", sans-serif; }
    .ps-os-layer { fill: rgba(var(--ink), 0.08); stroke: rgba(var(--ink), 0.26); stroke-width: 1; }
    .ps-os-layer-brand { fill: rgba(247,148,29,0.22); stroke: #f7941d; stroke-width: 1.5; stroke-opacity: 0.8; }
    .ps-os-lbl { fill: rgba(var(--ink), 0.78); font-size: 9px; font-weight: 700; letter-spacing: 0.07em; }
    .ps-os-lbl-brand { fill: #f7941d; }
    .ps-os-dot { fill: rgba(var(--ink), 0.72); animation: psOsFlicker 2s ease-in-out infinite; }
    .ps-os-chip { fill: rgba(var(--ink), 0.14); stroke: rgba(var(--ink), 0.38); stroke-width: 1; animation: psOsFlicker 2.5s ease-in-out infinite; }
    .ps-os-block { fill: rgba(var(--ink), 0.58); animation: psOsFlicker 1.9s ease-in-out infinite; }
    .ps-os-wire { stroke: rgba(var(--ink), 0.6); stroke-width: 1.5; stroke-linecap: round; stroke-dasharray: 3 3; animation: psOsFlow 0.75s linear infinite; }
    .ps-os-core { fill: #f7941d; transform-box: fill-box; transform-origin: center; animation: psOsPulse 2.2s ease-in-out infinite; }
    @keyframes psOsFlicker { 0%, 100% { opacity: 0.45; } 50% { opacity: 1; } }
    @keyframes psOsFlow { to { stroke-dashoffset: -6; } }
    @keyframes psOsPulse { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.55); opacity: 0.45; } }
  </style>

  <!-- Layer 4 · APPS & SERVICES -->
  <rect class="ps-os-layer" x="20" y="14" width="280" height="28" rx="8" />
  <text class="ps-os-lbl" x="34" y="32">APPS &amp; SERVICES</text>
  <circle class="ps-os-dot" cx="256" cy="28" r="3" style="animation-delay:0s" />
  <circle class="ps-os-dot" cx="268" cy="28" r="3" style="animation-delay:0.35s" />
  <circle class="ps-os-dot" cx="280" cy="28" r="3" style="animation-delay:0.7s" />

  <line class="ps-os-wire" x1="160" y1="42" x2="160" y2="54" />

  <!-- Layer 3 · AI MODULES -->
  <rect class="ps-os-layer" x="20" y="54" width="280" height="28" rx="8" />
  <text class="ps-os-lbl" x="34" y="72">AI MODULES</text>
  <rect class="ps-os-chip" x="156" y="61" width="34" height="14" rx="4" style="animation-delay:0s" />
  <rect class="ps-os-chip" x="198" y="61" width="34" height="14" rx="4" style="animation-delay:0.38s" />
  <rect class="ps-os-chip" x="240" y="61" width="34" height="14" rx="4" style="animation-delay:0.76s" />

  <line class="ps-os-wire" x1="160" y1="82" x2="160" y2="94" />

  <!-- Layer 2 · AI DATA PLATFORM (brand highlight) -->
  <rect class="ps-os-layer ps-os-layer-brand" x="20" y="94" width="280" height="28" rx="8" />
  <text class="ps-os-lbl ps-os-lbl-brand" x="34" y="112">AI DATA PLATFORM</text>
  <circle class="ps-os-core" cx="285" cy="108" r="5" />

  <line class="ps-os-wire" x1="160" y1="122" x2="160" y2="134" />

  <!-- Layer 1 · HARDWARE -->
  <rect class="ps-os-layer" x="20" y="134" width="280" height="28" rx="8" />
  <text class="ps-os-lbl" x="34" y="152">HARDWARE</text>
  <rect class="ps-os-block" x="178" y="141" width="18" height="14" rx="2" style="animation-delay:0s" />
  <rect class="ps-os-block" x="202" y="141" width="18" height="14" rx="2" style="animation-delay:0.24s" />
  <rect class="ps-os-block" x="226" y="141" width="18" height="14" rx="2" style="animation-delay:0.48s" />
  <rect class="ps-os-block" x="250" y="141" width="18" height="14" rx="2" style="animation-delay:0.72s" />
</svg>
