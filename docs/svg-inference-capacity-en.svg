<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 560" fill="none" role="img" aria-label="Inference Capacity Explorer">
  <style>
    svg { color-scheme: light dark; --ink: 228, 230, 238; }
    @media (prefers-color-scheme: light) { svg { --ink: 30, 32, 44; } }

    text { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }

    /* Typography */
    .ice-title  { fill: #f7941d; font-size: 15px; font-weight: 700; letter-spacing: 0.04em; }
    .ice-label  { fill: rgba(var(--ink), 0.42); font-size: 10px; font-weight: 600; letter-spacing: 0.08em; }
    .ice-h2     { fill: rgba(var(--ink), 0.88); font-size: 14px; font-weight: 700; }
    .ice-h3     { fill: rgba(var(--ink), 0.78); font-size: 12px; font-weight: 700; }
    .ice-body   { fill: rgba(var(--ink), 0.62); font-size: 11px; font-weight: 400; }
    .ice-body-s { fill: rgba(var(--ink), 0.42); font-size: 10px; font-weight: 400; }
    .ice-accent { fill: #f7941d; font-size: 13px; font-weight: 700; }
    .ice-num    { fill: rgba(var(--ink), 0.88); font-size: 20px; font-weight: 800; }
    .ice-num-brand { fill: #f7941d; font-size: 20px; font-weight: 800; }
    .ice-chip   { fill: rgba(var(--ink), 0.62); font-size: 9px; font-weight: 600; }
    .ice-axis   { fill: rgba(var(--ink), 0.42); font-size: 9px; font-weight: 500; }
    .ice-legend { fill: rgba(var(--ink), 0.62); font-size: 10px; font-weight: 500; }
    .ice-hint   { fill: rgba(var(--ink), 0.42); font-size: 9px; font-weight: 500; font-style: italic; }
    .ice-ver    { fill: rgba(var(--ink), 0.32); font-size: 9px; font-weight: 500; }
    .ice-stat   { fill: #f7941d; font-size: 11px; font-weight: 700; }
    .ice-stat-b { fill: #5b9bff; font-size: 11px; font-weight: 700; }

    /* Shapes */
    .ice-panel  { fill: rgba(var(--ink), 0.03); stroke: rgba(var(--ink), 0.12); stroke-width: 1; }
    .ice-card   { fill: rgba(var(--ink), 0.04); stroke: rgba(var(--ink), 0.14); stroke-width: 1; }
    .ice-bar-bg { fill: rgba(var(--ink), 0.06); }
    .ice-bar-l  { fill: rgba(var(--ink), 0.28); }
    .ice-bar-r  { fill: #f7941d; }
    .ice-chip-bg{ fill: rgba(var(--ink), 0.06); stroke: rgba(var(--ink), 0.18); stroke-width: 0.8; }
    .ice-sla    { stroke: #ef4444; stroke-width: 1; stroke-dasharray: 4 3; opacity: 0.6; }
    .ice-grid   { stroke: rgba(var(--ink), 0.06); stroke-width: 0.5; }
    .ice-line-l { stroke: rgba(var(--ink), 0.35); stroke-width: 1.8; fill: none; stroke-linejoin: round; }
    .ice-line-r { stroke: #f7941d; stroke-width: 2; fill: none; stroke-linejoin: round; }
    .ice-dot-l  { fill: rgba(var(--ink), 0.45); }
    .ice-dot-r  { fill: #f7941d; }

    .ice-pulse  { animation: icePulse 2.6s ease-in-out infinite; }
    @keyframes icePulse { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
  </style>


  <!-- ══ CCU Comparison Panel (top wide) ══ -->
  <rect class="ice-panel" x="30" y="84" width="800" height="160" rx="12" />
  <text class="ice-h2" x="50" y="112">Concurrent Users</text>

  <!-- Without aiDAPTIV bar -->
  <text class="ice-body" x="50" y="156">Without aiDAPTIV</text>
  <rect class="ice-bar-bg" x="190" y="144" width="620" height="18" rx="4" />
  <rect class="ice-bar-l"  x="190" y="144" width="130" height="18" rx="4" />
  <text class="ice-num" x="330" y="160">13</text>

  <!-- With aiDAPTIV bar -->
  <text class="ice-accent" x="50" y="196">With aiDAPTIV</text>
  <rect class="ice-bar-bg" x="190" y="184" width="620" height="18" rx="4" />
  <rect class="ice-bar-r"  x="190" y="184" width="390" height="18" rx="4" />
  <text class="ice-num-brand" x="590" y="200">39</text>

  <!-- Summary stats -->
  <text class="ice-stat" x="810" y="228" text-anchor="end">
    <tspan class="ice-stat">Concurrent users 295% increased</tspan>
    <tspan style="fill: rgba(var(--ink), 0.25); font-weight: 400;" dx="10">|</tspan>
    <tspan class="ice-stat" dx="10">GPU capacity 66.1% saved</tspan>
  </text>

  <!-- ══════════════════════════════════════════════════ -->
  <!-- TTFT Chart (bottom left)                          -->
  <!-- ══════════════════════════════════════════════════ -->
  <rect class="ice-card" x="30" y="260" width="390" height="234" rx="12" />
  <text class="ice-h3" x="50" y="288">TTFT</text>
  <text class="ice-hint" x="90" y="288">Lower is better</text>

  <!-- Y-axis labels -->
  <text class="ice-axis" x="54" y="318">60s</text>
  <text class="ice-axis" x="54" y="353">40s</text>
  <text class="ice-axis" x="54" y="388">20s</text>
  <text class="ice-axis" x="54" y="423">10s</text>
  <text class="ice-axis" x="60" y="458">0</text>

  <!-- Grid lines -->
  <line class="ice-grid" x1="80" y1="314" x2="400" y2="314" />
  <line class="ice-grid" x1="80" y1="349" x2="400" y2="349" />
  <line class="ice-grid" x1="80" y1="384" x2="400" y2="384" />
  <line class="ice-grid" x1="80" y1="419" x2="400" y2="419" />
  <line class="ice-grid" x1="80" y1="454" x2="400" y2="454" />

  <!-- SLA line at 10s -->
  <line class="ice-sla" x1="80" y1="419" x2="400" y2="419" />

  <!-- Without aiDAPTIV line (32K: 7.76, 14.77, 22.54, 37.73, 45.7, 61.96) -->
  <polyline class="ice-line-l" points="80,437 144,422 208,406 272,373 336,356 400,321" />
  <circle class="ice-dot-l" cx="80"  cy="437" r="3" />
  <circle class="ice-dot-l" cx="144" cy="422" r="3" />
  <circle class="ice-dot-l" cx="208" cy="406" r="3" />
  <circle class="ice-dot-l" cx="272" cy="373" r="3" />
  <circle class="ice-dot-l" cx="336" cy="356" r="3" />
  <circle class="ice-dot-l" cx="400" cy="321" r="3" />

  <!-- With aiDAPTIV line (32K: 2.93, 5.51, 7.87, 12.66, 15.3, 20.52) -->
  <polyline class="ice-line-r" points="80,447 144,442 208,437 272,427 336,421 400,410" />
  <circle class="ice-dot-r" cx="80"  cy="447" r="3" />
  <circle class="ice-dot-r" cx="144" cy="442" r="3" />
  <circle class="ice-dot-r" cx="208" cy="437" r="3" />
  <circle class="ice-dot-r" cx="272" cy="427" r="3" />
  <circle class="ice-dot-r" cx="336" cy="421" r="3" />
  <circle class="ice-dot-r" cx="400" cy="410" r="3" />

  <!-- X-axis labels -->
  <text class="ice-axis" x="77"  y="470">10</text>
  <text class="ice-axis" x="141" y="470">20</text>
  <text class="ice-axis" x="205" y="470">30</text>
  <text class="ice-axis" x="269" y="470">50</text>
  <text class="ice-axis" x="333" y="470">60</text>
  <text class="ice-axis" x="397" y="470">80</text>
  <text class="ice-axis" x="220" y="484">Concurrent Users</text>

  <!-- ══════════════════════════════════════════════════ -->
  <!-- TPS Chart (bottom right)                          -->
  <!-- ══════════════════════════════════════════════════ -->
  <rect class="ice-card" x="440" y="260" width="390" height="234" rx="12" />
  <text class="ice-h3" x="460" y="288">Token Per Second</text>
  <text class="ice-hint" x="580" y="288">Higher is better</text>

  <!-- Y-axis labels -->
  <text class="ice-axis" x="460" y="318">80</text>
  <text class="ice-axis" x="460" y="348">60</text>
  <text class="ice-axis" x="460" y="378">40</text>
  <text class="ice-axis" x="460" y="408">20</text>
  <text class="ice-axis" x="466" y="458">0</text>

  <!-- Grid lines -->
  <line class="ice-grid" x1="490" y1="314" x2="810" y2="314" />
  <line class="ice-grid" x1="490" y1="344" x2="810" y2="344" />
  <line class="ice-grid" x1="490" y1="374" x2="810" y2="374" />
  <line class="ice-grid" x1="490" y1="404" x2="810" y2="404" />
  <line class="ice-grid" x1="490" y1="454" x2="810" y2="454" />

  <!-- SLA line at 20 t/s -->
  <line class="ice-sla" x1="490" y1="404" x2="810" y2="404" />

  <!-- With aiDAPTIV line (32K: 66.31, 41.21, 45.63, 41.83, 39.59, 36.21) -->
  <polyline class="ice-line-r" points="490,330 554,377 618,368 682,375 746,380 810,386" />
  <circle class="ice-dot-r" cx="490" cy="330" r="3" />
  <circle class="ice-dot-r" cx="554" cy="377" r="3" />
  <circle class="ice-dot-r" cx="618" cy="368" r="3" />
  <circle class="ice-dot-r" cx="682" cy="375" r="3" />
  <circle class="ice-dot-r" cx="746" cy="380" r="3" />
  <circle class="ice-dot-r" cx="810" cy="386" r="3" />

  <!-- Without aiDAPTIV line (32K: 30.93, 14.12, 12.32, 10.4, 8.4, 7.86) -->
  <polyline class="ice-line-l" points="490,396 554,427 618,431 682,434 746,438 810,439" />
  <circle class="ice-dot-l" cx="490" cy="396" r="3" />
  <circle class="ice-dot-l" cx="554" cy="427" r="3" />
  <circle class="ice-dot-l" cx="618" cy="431" r="3" />
  <circle class="ice-dot-l" cx="682" cy="434" r="3" />
  <circle class="ice-dot-l" cx="746" cy="438" r="3" />
  <circle class="ice-dot-l" cx="810" cy="439" r="3" />

  <!-- X-axis labels -->
  <text class="ice-axis" x="487" y="470">10</text>
  <text class="ice-axis" x="551" y="470">20</text>
  <text class="ice-axis" x="615" y="470">30</text>
  <text class="ice-axis" x="679" y="470">50</text>
  <text class="ice-axis" x="743" y="470">60</text>
  <text class="ice-axis" x="807" y="470">80</text>
  <text class="ice-axis" x="620" y="484">Concurrent Users</text>

  <!-- ══════════════════════════════════════════════════ -->
  <!-- Legend & Config Chips                             -->
  <!-- ══════════════════════════════════════════════════ -->
  <!-- Legend -->
  <rect fill="rgba(var(--ink), 0.28)" x="30" y="506" width="10" height="10" rx="2" />
  <text class="ice-legend" x="46" y="515">Without aiDAPTIV</text>
  <rect fill="#f7941d" x="160" y="506" width="10" height="10" rx="2" />
  <text class="ice-legend" x="176" y="515">With aiDAPTIV</text>
  <line class="ice-sla" x1="280" y1="511" x2="300" y2="511" />
  <text class="ice-legend" x="306" y="515">SLA threshold</text>

  <!-- Config chips -->
  <rect class="ice-chip-bg" x="440" y="502" width="74" height="20" rx="10" />
  <text class="ice-chip" x="477" y="515" text-anchor="middle">H200 ×1</text>
  <rect class="ice-chip-bg" x="522" y="502" width="86" height="20" rx="10" />
  <text class="ice-chip" x="565" y="515" text-anchor="middle">32K context</text>
  <rect class="ice-chip-bg" x="616" y="502" width="86" height="20" rx="10" />
  <text class="ice-chip" x="659" y="515" text-anchor="middle">TTFT ≤ 10.0s</text>
  <rect class="ice-chip-bg" x="710" y="502" width="76" height="20" rx="10" />
  <text class="ice-chip" x="748" y="515" text-anchor="middle">TP ≥ 20 t/s</text>


</svg>
