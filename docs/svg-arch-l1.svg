<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 348 120" preserveAspectRatio="xMidYMid meet" fill="none" role="img" aria-label="L1 Infrastructure — Hyper-Connections">
  <style>
    /* Transparent background — adapts to GitHub light/dark theme. */
    svg { color-scheme: light dark; --ink: 255, 255, 255; }
    @media (prefers-color-scheme: light) { svg { --ink: 30, 32, 44; } }

    text { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", sans-serif; }
    .arch-l1-cap { fill: rgba(var(--ink), 0.65); font-size: 8px; font-weight: 700; letter-spacing: 0.1em; }
    .arch-l1-box { fill: rgba(var(--ink), 0.06); stroke: rgba(var(--ink), 0.22); stroke-width: 1; }
    .arch-l1-box-brand { fill: rgba(247,148,29,0.20); stroke: #f7941d; stroke-opacity: 0.6; }
    .arch-l1-lbl { fill: rgba(var(--ink), 0.72); font-size: 8px; font-weight: 700; letter-spacing: 0.06em; }
    .arch-l1-pulse { fill: rgba(var(--ink), 0.45); animation: archFlicker 1.9s ease-in-out infinite; }
    .arch-l1-fabric { fill: none; stroke: rgba(var(--ink), 0.55); stroke-width: 2; stroke-linecap: round;
      stroke-dasharray: 220; stroke-dashoffset: 220; animation: archDraw 1.6s cubic-bezier(0.22,1,0.36,1) 0.2s forwards; }
    .arch-l1-fabric-dot { fill: #f7941d; opacity: 0; transform-box: fill-box; transform-origin: center;
      animation: archDotIn 0.4s ease 1.5s forwards, archPulse 2.4s ease-in-out 1.9s infinite; }
    @keyframes archFlicker { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    @keyframes archDraw { to { stroke-dashoffset: 0; } }
    @keyframes archDotIn { to { opacity: 1; } }
    @keyframes archPulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } }
  </style>

  <text class="arch-l1-cap" x="20" y="18">HYPER-CONNECTIONS</text>

  <!-- GPU -->
  <g>
    <rect class="arch-l1-box" x="20" y="28" width="68" height="52" rx="8" />
    <text class="arch-l1-lbl" x="54" y="48" text-anchor="middle">GPU</text>
    <rect class="arch-l1-pulse" x="42" y="56" width="24" height="14" rx="3" style="animation-delay:0s" />
  </g>
  <!-- CPU -->
  <g>
    <rect class="arch-l1-box" x="102" y="28" width="68" height="52" rx="8" />
    <text class="arch-l1-lbl" x="136" y="48" text-anchor="middle">CPU</text>
    <rect class="arch-l1-pulse" x="124" y="56" width="24" height="14" rx="3" style="animation-delay:0.2s" />
  </g>
  <!-- CACHE (brand) -->
  <g>
    <rect class="arch-l1-box arch-l1-box-brand" x="184" y="28" width="68" height="52" rx="8" />
    <text class="arch-l1-lbl" x="218" y="48" text-anchor="middle">CACHE</text>
    <rect class="arch-l1-pulse" x="206" y="56" width="24" height="14" rx="3" style="animation-delay:0.4s" />
  </g>
  <!-- STORE -->
  <g>
    <rect class="arch-l1-box" x="266" y="28" width="68" height="52" rx="8" />
    <text class="arch-l1-lbl" x="300" y="48" text-anchor="middle">STORE</text>
    <rect class="arch-l1-pulse" x="288" y="56" width="24" height="14" rx="3" style="animation-delay:0.6s" />
  </g>

  <!-- Fabric line + dot -->
  <polyline class="arch-l1-fabric" points="54,54 136,54 218,54 318,54" />
  <circle class="arch-l1-fabric-dot" cx="318" cy="54" r="4" />
</svg>
