<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 130" fill="none" role="img" aria-label="Decoupled Cost — offload VRAM to cheaper NVMe storage">
  <style>
    svg { color-scheme: light dark; --ink: 255, 255, 255; }
    @media (prefers-color-scheme: light) { svg { --ink: 30, 32, 44; } }

    text { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", sans-serif; }
    .dc-lbl     { fill: rgba(var(--ink), 0.48); font-size: 9px; font-weight: 700; letter-spacing: 0.1em; }
    .dc-cap     { fill: rgba(var(--ink), 0.42); font-size: 9px; font-weight: 600; letter-spacing: 0.05em; }
    .dc-cap-hi  { fill: rgba(247,148,29,0.80); font-size: 9px; font-weight: 600; letter-spacing: 0.05em; }
    .dc-vram    { fill: rgba(var(--ink), 0.04); stroke: rgba(var(--ink), 0.30); stroke-width: 1; stroke-dasharray: 3 2; }
    .dc-nvme    { fill: rgba(var(--ink), 0.06); stroke: rgba(var(--ink), 0.50); stroke-width: 1.2; }
    .dc-swap    { stroke: rgba(247,148,29,0.85); stroke-width: 1.6; stroke-linecap: round; stroke-dasharray: 5 3; animation: dcFlow 0.9s linear infinite; }
    .dc-head    { fill: rgba(247,148,29,0.85); }
    .dc-nvme-bar { fill: rgba(var(--ink), 0.18); stroke: rgba(var(--ink), 0.30); stroke-width: 0.6; animation: dcFill 2.4s ease-in-out infinite; }
    .dc-vram-bar { fill: rgba(var(--ink), 0.10); stroke: rgba(var(--ink), 0.22); stroke-width: 0.5; animation: dcFade 3s ease-in-out infinite; }
    .dc-down    { stroke: rgba(247,148,29,0.70); stroke-width: 1.4; stroke-linecap: round; }
    .dc-down-hd { fill: rgba(247,148,29,0.70); animation: dcBounce 2s ease-in-out infinite; }

    @keyframes dcFlow   { to { stroke-dashoffset: -8; } }
    @keyframes dcFill   { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    @keyframes dcFade   { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.15; } }
    @keyframes dcBounce { 0%, 100% { transform: translateY(0); opacity: 0.5; } 50% { transform: translateY(3px); opacity: 1; } }
  </style>

  <!-- VRAM block (expensive, small) -->
  <rect class="dc-vram" x="24" y="28" width="50" height="64" rx="5" />
  <text class="dc-lbl" x="49" y="22" text-anchor="middle">VRAM</text>
  <text class="dc-cap" x="49" y="116" text-anchor="middle">$$$</text>

  <!-- VRAM capacity bars (few) -->
  <rect class="dc-vram-bar" x="32" y="38" width="34" height="8" rx="2" style="animation-delay:0.1s" />
  <rect class="dc-vram-bar" x="32" y="50" width="34" height="8" rx="2" style="animation-delay:0.35s" />

  <!-- Swap arrow -->
  <line class="dc-swap" x1="82" y1="60" x2="118" y2="60" />
  <polygon class="dc-head" points="118,60 112,56 112,64" />

  <!-- NVMe block (cheap, large) -->
  <rect class="dc-nvme" x="126" y="20" width="68" height="80" rx="5" />
  <text class="dc-lbl" x="160" y="14" text-anchor="middle">NVMe</text>
  <text class="dc-cap-hi" x="160" y="116" text-anchor="middle">$</text>

  <!-- NVMe capacity bars (many) -->
  <rect class="dc-nvme-bar" x="134" y="30" width="52" height="8" rx="2" />
  <rect class="dc-nvme-bar" x="134" y="42" width="52" height="8" rx="2" style="animation-delay:0.25s" />
  <rect class="dc-nvme-bar" x="134" y="54" width="52" height="8" rx="2" style="animation-delay:0.5s" />
  <rect class="dc-nvme-bar" x="134" y="66" width="52" height="8" rx="2" style="animation-delay:0.75s" />
  <rect class="dc-nvme-bar" x="134" y="78" width="52" height="8" rx="2" style="animation-delay:1.0s" />

  <!-- Cost-down indicator -->
  <path class="dc-down" d="M100 78l0 12" />
  <polygon class="dc-down-hd" points="100,92 96,86 104,86" />
</svg>
