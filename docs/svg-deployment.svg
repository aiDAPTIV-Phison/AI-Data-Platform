<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 176" fill="none" role="img" aria-label="Deployment cost reduction">
  <style>
    /* Transparent background — adapts to GitHub light/dark theme. */
    svg { color-scheme: light dark; --ink: 255, 255, 255; }
    @media (prefers-color-scheme: light) { svg { --ink: 30, 32, 44; } }

    text { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", sans-serif; }
    .ps-dep-title { fill: rgba(var(--ink), 0.72); font-size: 9px; font-weight: 700; letter-spacing: 0.09em; }
    .ps-dep-base { stroke: rgba(var(--ink), 0.3); stroke-width: 1; }
    .ps-dep-bar { fill: rgba(var(--ink), 0.32); transform-box: fill-box; transform-origin: center bottom;
      animation: psDepBarIn 1.1s cubic-bezier(0.22,1,0.36,1) both, psDepBarBreathe 3s ease-in-out 1.5s infinite; }
    .ps-dep-bar-brand { fill: rgba(247,148,29,0.88); }
    .ps-dep-lbl { fill: rgba(var(--ink), 0.65); font-size: 8px; font-weight: 600; letter-spacing: 0.06em; }
    .ps-dep-spark { stroke: rgba(var(--ink), 0.65); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none;
      stroke-dasharray: 200; stroke-dashoffset: 200; animation: psDepDraw 1.8s cubic-bezier(0.22,1,0.36,1) 0.4s both; }
    .ps-dep-spark-dot { fill: #f7941d; opacity: 0; transform-box: fill-box; transform-origin: center;
      animation: psDepDotIn 0.4s ease 1.9s forwards, psDepPulse 2.4s ease-in-out 2.3s infinite; }
    .ps-dep-badge-bg { fill: rgba(247,148,29,0.22); stroke: #f7941d; stroke-width: 1; stroke-opacity: 0.55;
      opacity: 0; animation: psDepDotIn 0.4s ease 2s forwards; }
    .ps-dep-badge-txt { fill: #f7941d; font-size: 9px; font-weight: 700; opacity: 0; animation: psDepDotIn 0.4s ease 2.1s forwards; }
    @keyframes psDepBarIn { from { transform: scaleY(0); } to { transform: scaleY(1); } }
    @keyframes psDepBarBreathe { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.96); } }
    @keyframes psDepDraw { to { stroke-dashoffset: 0; } }
    @keyframes psDepDotIn { to { opacity: 1; } }
    @keyframes psDepPulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.6); opacity: 0.5; } }
  </style>

  <text class="ps-dep-title" x="20" y="20">DEPLOYMENT COST</text>
  <line class="ps-dep-base" x1="40" y1="150" x2="280" y2="150" />

  <!-- Bars -->
  <rect class="ps-dep-bar" x="54" y="42" width="52" height="108" rx="4" style="animation-delay:0s" />
  <rect class="ps-dep-bar" x="134" y="80" width="52" height="70" rx="4" style="animation-delay:0.18s" />
  <rect class="ps-dep-bar ps-dep-bar-brand" x="214" y="114" width="52" height="36" rx="4" style="animation-delay:0.36s" />

  <!-- Labels -->
  <text class="ps-dep-lbl" x="80" y="164" text-anchor="middle">LEGACY</text>
  <text class="ps-dep-lbl" x="160" y="164" text-anchor="middle">HYBRID</text>
  <text class="ps-dep-lbl" x="240" y="164" text-anchor="middle">aiDAPTIV</text>

  <!-- Sparkline + dot -->
  <polyline class="ps-dep-spark" points="80,38 160,76 240,110" />
  <circle class="ps-dep-spark-dot" cx="240" cy="110" r="4" />

  <!-- Savings badge -->
  <rect class="ps-dep-badge-bg" x="212" y="84" width="56" height="20" rx="10" />
  <text class="ps-dep-badge-txt" x="240" y="98" text-anchor="middle">&#8722;61%</text>
</svg>
