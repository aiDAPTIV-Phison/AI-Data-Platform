<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" fill="none" role="img" aria-label="L4 Modules / Inference">
  <style>
    /* Transparent background — adapts to GitHub light/dark theme. */
    svg { color-scheme: light dark; --ink: 255, 255, 255; }
    @media (prefers-color-scheme: light) { svg { --ink: 30, 32, 44; } }

    text { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", sans-serif; }
    .arch-l4-cap { fill: rgba(var(--ink), 0.65); font-size: 8px; font-weight: 700; letter-spacing: 0.1em; }
    .arch-l4-pill { fill: rgba(var(--ink), 0.10); stroke: rgba(var(--ink), 0.32); stroke-width: 1.2; }
    .arch-l4-pill-b { fill: rgba(247,148,29,0.14); stroke: rgba(247,148,29,0.55); }
    .arch-l4-dot { fill: rgba(var(--ink), 0.80); animation: archFlicker 2s ease-in-out infinite; }
    .arch-l4-bar { fill: rgba(var(--ink), 0.42); animation: archFlicker 2.2s ease-in-out infinite; }
    .arch-l4-wire { stroke: rgba(var(--ink), 0.45); stroke-width: 1.5; stroke-linecap: round; stroke-dasharray: 3 3; animation: archFlow 0.7s linear infinite; }
    @keyframes archFlicker { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    @keyframes archFlow { to { stroke-dashoffset: -6; } }
  </style>

  <text class="arch-l4-cap" x="20" y="18">MODULES · INFERENCE</text>

  <!-- Pill A -->
  <rect class="arch-l4-pill" x="20" y="28" width="88" height="36" rx="8" />
  <circle class="arch-l4-dot" cx="36" cy="46" r="5" />
  <rect class="arch-l4-bar" x="50" y="38" width="22" height="5" rx="2.5" style="animation-delay:0.1s" />
  <rect class="arch-l4-bar" x="76" y="38" width="14" height="5" rx="2.5" style="animation-delay:0.25s" />
  <rect class="arch-l4-bar" x="50" y="48" width="34" height="4" rx="2" style="animation-delay:0.3s" />

  <!-- Pill B (brand) -->
  <rect class="arch-l4-pill arch-l4-pill-b" x="116" y="28" width="88" height="36" rx="8" />
  <circle class="arch-l4-dot" cx="132" cy="46" r="5" style="animation-delay:0.35s" />
  <rect class="arch-l4-bar" x="146" y="38" width="26" height="5" rx="2.5" style="animation-delay:0.4s" />
  <rect class="arch-l4-bar" x="176" y="38" width="12" height="5" rx="2.5" style="animation-delay:0.55s" />
  <rect class="arch-l4-bar" x="146" y="48" width="30" height="4" rx="2" style="animation-delay:0.5s" />

  <!-- Pill C -->
  <rect class="arch-l4-pill" x="212" y="28" width="88" height="36" rx="8" />
  <circle class="arch-l4-dot" cx="228" cy="46" r="5" style="animation-delay:0.7s" />
  <rect class="arch-l4-bar" x="242" y="38" width="20" height="5" rx="2.5" style="animation-delay:0.75s" />
  <rect class="arch-l4-bar" x="266" y="38" width="16" height="5" rx="2.5" style="animation-delay:0.85s" />
  <rect class="arch-l4-bar" x="242" y="48" width="28" height="4" rx="2" style="animation-delay:0.8s" />

  <!-- Wires -->
  <line class="arch-l4-wire" x1="64" y1="64" x2="64" y2="78" />
  <line class="arch-l4-wire" x1="160" y1="64" x2="160" y2="78" />
  <line class="arch-l4-wire" x1="256" y1="64" x2="256" y2="78" />
</svg>
